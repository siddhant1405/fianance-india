databases:
  - name: finpulse-db
    databaseName: finpulse
    user: finpulse
    plan: free

services:
  - type: redis
    name: finpulse-redis
    plan: free
    ipAllowList: []

  - type: web
    name: forex-analytics-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: finpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: finpulse-redis
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        value: "https://6a490bc23aae2f000841cc7b--finance-india1.netlify.app"
      - key: EXCHANGE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false

  - type: cron
    name: keep-backend-awake
    runtime: python
    plan: free
    schedule: "*/14 * * * *"
    command: python -c "import urllib.request; urllib.request.urlopen('http://forex-analytics-backend:8000/health')"
